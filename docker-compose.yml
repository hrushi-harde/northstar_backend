services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: northstar-backend
    container_name: northstar-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      FRONTEND_URL: "http://localhost:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
